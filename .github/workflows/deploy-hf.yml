name: Deploy backend to HuggingFace Spaces

# Triggers: any push to master/main that touches the backend OR this workflow
on:
  push:
    branches: [master, main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-hf.yml'
      - '.github/hf/**'
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare HuggingFace deployment bundle
        run: |
          mkdir -p hf_deploy

          # Copy all backend source (exclude dev-only files)
          rsync -av \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '*.pyo' \
            --exclude '.env' \
            --exclude 'db.sqlite3' \
            --exclude 'staticfiles/' \
            --exclude '.pytest_cache/' \
            backend/ hf_deploy/

          # Replace with HF-specific Dockerfile and README
          cp .github/hf/Dockerfile hf_deploy/Dockerfile
          cp .github/hf/README.md  hf_deploy/README.md

          echo "--- Files to be deployed ---"
          find hf_deploy -type f | sort

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN:      ${{ secrets.HF_TOKEN }}
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE:      ${{ secrets.HF_SPACE }}
        run: |
          echo "Cloning Hugging Face Space..."
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE hf_repo
          
          echo "Copying files to repo..."
          # Remove existing files except .git
          find hf_repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a hf_deploy/. hf_repo/
          
          cd hf_repo
          git config user.email "github-actions@github.com"
          git config user.name  "GitHub Actions"
          
          git add --all
          git commit -m "Deploy $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          
          echo "Pushing to Hugging Face..."
          git push
          
          echo "✅ Deployed to: https://huggingface.co/spaces/$HF_USERNAME/$HF_SPACE"
          echo "🌐 API URL:     https://$HF_USERNAME-$HF_SPACE.hf.space"
