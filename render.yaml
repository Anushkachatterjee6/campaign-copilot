services:
  # ── Django backend (ASGI / Daphne) ─────────────────────────────────────────
  - type: web
    name: campaign-copilot-api
    runtime: python
    rootDir: backend
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py seed_data --customers 1000 --orders 5000 --seed 42
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    healthCheckPath: /api/stats/
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: CORS_ALLOW_ALL
        value: "true"               # Allow all origins until FRONTEND_URL is set
      - key: FRONTEND_URL
        value: ""                   # Set this to your Vercel URL after first deploy
      - key: GEMINI_API_KEY
        sync: false                 # You enter this manually in the Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: campaign-copilot-db
          property: connectionString
    autoDeploy: true

databases:
  # ── PostgreSQL (free tier, 1 GB) ───────────────────────────────────────────
  - name: campaign-copilot-db
    databaseName: campaign_copilot
    user: campaign_copilot
    plan: free
